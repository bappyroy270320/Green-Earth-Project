<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>



<body>

    <main class="container mx-auto space-y-6 bg-white">
        <h2 class="text-[#4ade80] font-bold text-3xl text-center">Choose Your Trees</h2>

        <div class="grid grid-cols-12 gap-8">

            <!-- categories -->
            <div class="bg-white card card-body col-span-3">
                <h2 class="font-bold text-2xl">Categories</h2>
                <div class="space-y-3">
                    <button class="btn btn-success w-full" id="allTreesbtn">All Trees</button>
                    <!-- categories container -->
                    <div id="categoriesContainer" class="space-y-3">
                        <!-- categories will be dynamically loaded here by JS -->

                    </div>
                </div>
            </div>

            <!-- Trees -->
            <div class="bg-white  col-span-6">

                <!-- trees renderd -->
                <div id="treesContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-6">

                    <!-- dynamically added here -->
                    
                </div>
                <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">

                    <span class="loading loading-spinner text-success"></span>
                </div>



            </div>

            <!-- cart -->
            <div class="bg-white col-span-3">
                Cart
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
