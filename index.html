<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>



<body>

    <main class="container mx-auto text-center">
    <h2 class="text-[#4ade80] font-bold text-3xl">Choose Your Trees</h2>

    <div class="grid grid-cols-12 gap-8">

        <!-- categories -->
        <div class="bg-red-500 col-span-3">
            <h2 class="font-bold text-2xl">Categories</h2>
            <div class="space-y-3">
                <button class="btn btn-success w-full" id="allTreesbtn">All Trees</button>
                <!-- categories container -->
                 <div id="categoriesContainer" class="space-y-3">
                    <!-- categories will be dynamically loaded here by JS -->

                 </div>
            </div>
        </div>

        <!-- Trees -->
        <div class="bg-red-500 col-span-6">
            Trees
        </div>

        <!-- cart -->
        <div class="bg-red-500 col-span-3">
            Cart
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>

</html>
